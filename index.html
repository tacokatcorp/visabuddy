<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Visa Buddy — Immigration Document Organizer</title>
  <meta name="description" content="Securely organize your immigration documents and autofill applications." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand-50: #FDFAF5;
      --sand-100: #F5EFE0;
      --sand-200: #E8DCC8;
      --sand-300: #D4C4A8;
      --sand-500: #9E8C70;
      --sand-700: #5C4F38;
      --sand-900: #2A2318;
      --teal-400: #0D9488;
      --teal-500: #0F766E;
      --teal-600: #115E59;
      --accent: #C84B2F;
      --accent-light: #F5E8E4;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 2px 12px rgba(42,35,24,0.10);
      --shadow-lg: 0 8px 40px rgba(42,35,24,0.14);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--sand-50);
      color: var(--sand-900);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    h1, h2, h3 { font-family: 'DM Serif Display', serif; font-weight: 400; }

    /* ── AUTH PAGE ── */
    .auth-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .auth-left {
      background: var(--sand-900);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 56px 64px;
      position: relative;
      overflow: hidden;
    }

    .auth-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 80%, rgba(13,148,136,0.18) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(200,75,47,0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    .auth-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--sand-50);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .auth-logo-icon {
      width: 36px;
      height: 36px;
      background: var(--teal-400);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .auth-hero h2 {
      font-size: clamp(36px, 4vw, 52px);
      color: var(--sand-50);
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .auth-hero p {
      color: var(--sand-300);
      font-size: 16px;
      max-width: 380px;
      font-weight: 300;
    }

    .auth-features {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .auth-feature {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--sand-200);
      font-size: 14px;
    }

    .auth-feature-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal-400);
      flex-shrink: 0;
    }

    .auth-right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: var(--sand-50);
    }

    .auth-form-wrap {
      width: 100%;
      max-width: 400px;
    }

    .auth-form-wrap h3 {
      font-size: 30px;
      margin-bottom: 8px;
      color: var(--sand-900);
    }

    .auth-form-wrap .sub {
      color: var(--sand-500);
      margin-bottom: 36px;
      font-size: 14px;
    }

    .auth-tabs {
      display: flex;
      background: var(--sand-100);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 28px;
    }

    .auth-tab {
      flex: 1;
      padding: 9px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--sand-500);
      transition: all 0.18s;
    }

    .auth-tab.active {
      background: white;
      color: var(--sand-900);
      box-shadow: 0 1px 4px rgba(42,35,24,0.12);
    }

    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--sand-700);
      margin-bottom: 6px;
    }

    .field input, .field select, .field textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--sand-200);
      border-radius: var(--radius-sm);
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--sand-900);
      transition: border-color 0.15s;
      outline: none;
    }

    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--teal-400);
    }

    .field textarea { min-height: 80px; resize: vertical; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--sand-900);
      color: var(--sand-50);
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
    }

    .btn-primary:hover { background: var(--sand-700); }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    .error-msg {
      color: var(--accent);
      font-size: 13px;
      margin-bottom: 14px;
      padding: 10px 12px;
      background: var(--accent-light);
      border-radius: var(--radius-sm);
    }

    .success-msg {
      color: var(--teal-600);
      font-size: 13px;
      margin-bottom: 14px;
      padding: 10px 12px;
      background: #E0F2F1;
      border-radius: var(--radius-sm);
    }

    /* ── APP SHELL ── */
    .app-shell {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: var(--sand-900);
      display: flex;
      flex-direction: column;
      padding: 28px 20px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--sand-50);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
      padding: 0 8px;
    }

    .sidebar-logo-icon {
      width: 30px;
      height: 30px;
      background: var(--teal-400);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sand-500);
      padding: 0 10px;
      margin-bottom: 8px;
      margin-top: 20px;
    }

    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      color: var(--sand-300);
      font-size: 14px;
      font-weight: 400;
      transition: all 0.15s;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
    }

    .nav-item:hover { background: rgba(255,255,255,0.07); color: var(--sand-100); }

    .nav-item.active {
      background: rgba(13,148,136,0.18);
      color: #5EEAD4;
      font-weight: 500;
    }

    .nav-icon { font-size: 16px; flex-shrink: 0; }

    .nav-count {
      margin-left: auto;
      background: rgba(255,255,255,0.1);
      color: var(--sand-400, #B8A88A);
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 999px;
    }

    .nav-item.active .nav-count {
      background: rgba(13,148,136,0.3);
      color: #5EEAD4;
    }

    .sidebar-footer {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 16px;
      margin-top: 16px;
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      background: var(--teal-500);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: white;
      flex-shrink: 0;
    }

    .user-email {
      font-size: 12px;
      color: var(--sand-400, #B8A88A);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .logout-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--sand-500);
      font-size: 13px;
      padding: 6px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .logout-btn:hover { color: var(--sand-200); background: rgba(255,255,255,0.07); }

    /* ── MAIN CONTENT ── */
    .main-content {
      padding: 40px 48px;
      max-width: 900px;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h2 {
      font-size: 32px;
      color: var(--sand-900);
      margin-bottom: 4px;
    }

    .page-header p {
      color: var(--sand-500);
      font-size: 14px;
    }

    /* ── CARDS & TABLES ── */
    .card {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--sand-200);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      margin-bottom: 16px;
      color: var(--sand-900);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-row.three { grid-template-columns: 1fr 1fr 1fr; }

    .btn-add {
      padding: 10px 20px;
      background: var(--teal-400);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }

    .btn-add:hover { background: var(--teal-500); }
    .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-sm {
      padding: 5px 12px;
      border: 1px solid var(--sand-200);
      background: white;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      color: var(--sand-700);
      transition: all 0.15s;
    }

    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 13px;
    }

    .data-table th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--sand-500);
      border-bottom: 1px solid var(--sand-100);
    }

    .data-table td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--sand-100);
      color: var(--sand-700);
      vertical-align: middle;
    }

    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--sand-50); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--sand-500);
      font-size: 14px;
    }

    .empty-state .empty-icon { font-size: 32px; margin-bottom: 10px; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge-teal { background: #E0F2F1; color: var(--teal-600); }
    .badge-amber { background: #FEF3C7; color: #92400E; }
    .badge-red { background: var(--accent-light); color: var(--accent); }
    .badge-gray { background: var(--sand-100); color: var(--sand-700); }

    .warn-box {
      border: 1px solid #FBBF24;
      background: #FFFBEB;
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 13px;
      color: #78350F;
      margin-bottom: 16px;
    }

    .warn-box strong { font-weight: 600; }

    .ack-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--sand-700);
    }

    .ack-row input[type=checkbox] { margin-top: 2px; flex-shrink: 0; }

    /* ── DASHBOARD ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .kpi-card {
      background: white;
      border: 1px solid var(--sand-200);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .kpi-num {
      font-family: 'DM Serif Display', serif;
      font-size: 36px;
      color: var(--sand-900);
      line-height: 1;
      margin-bottom: 4px;
    }

    .kpi-label { font-size: 12px; color: var(--sand-500); font-weight: 500; }

    .dashboard-section {
      background: white;
      border: 1px solid var(--sand-200);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .dashboard-section h3 {
      font-size: 16px;
      color: var(--sand-900);
      margin-bottom: 4px;
    }

    .dashboard-section .ds-sub {
      font-size: 13px;
      color: var(--sand-500);
      margin-bottom: 16px;
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .progress-label { width: 130px; color: var(--sand-700); flex-shrink: 0; }

    .progress-bar-wrap {
      flex: 1;
      height: 6px;
      background: var(--sand-100);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--teal-400);
      border-radius: 999px;
      transition: width 0.5s ease;
    }

    .progress-count { color: var(--sand-500); font-size: 12px; min-width: 30px; text-align: right; }

    /* ── LOADING ── */
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--sand-200);
      border-top-color: var(--teal-400);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 14px;
      color: var(--sand-500);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .auth-page { grid-template-columns: 1fr; }
      .auth-left { display: none; }
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .main-content { padding: 24px 20px; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .form-row { grid-template-columns: 1fr; }
      .form-row.three { grid-template-columns: 1fr; }
    }

    @media (max-width: 500px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── MASKED VALUE ── */
    .masked { font-family: monospace; letter-spacing: 0.08em; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="app.js"></script>
</body>
</html>
